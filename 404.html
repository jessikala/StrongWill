<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // ROOT LEVEL 404.html for GitHub Pages
    // This file should be placed at the ROOT of your GitHub Pages repository
    // NOT in the /jb/ subdirectory

    (function() {
      var l = window.location;
      var path = l.pathname;

      // If the path starts with /jb/, redirect to the SPA
      if (path.startsWith('/jb/') && path !== '/jb/') {
        // Extract the path after /jb/
        var pathSegments = path.split('/').filter(Boolean);

        // First segment should be 'jb', rest is the actual route
        if (pathSegments[0] === 'jb' && pathSegments.length > 1) {
          var route = pathSegments.slice(1).join('/');

          // Store the route in sessionStorage for the app to use
          sessionStorage.setItem('ghpagesRedirect', '/' + route + l.search + l.hash);

          // Redirect to the base /jb/ URL
          l.replace(l.protocol + '//' + l.host + '/jb/');
        }
      } else if (path.startsWith('/incoc/') && path !== '/incoc/') {
        // Extract the path after /incoc/
        var pathSegments = path.split('/').filter(Boolean);

        // First segment should be 'incoc', rest is the actual route
        if (pathSegments[0] === 'incoc' && pathSegments.length > 1) {
          var route = pathSegments.slice(1).join('/');

          // Store the route in sessionStorage for the app to use
          sessionStorage.setItem('ghpagesRedirect', '/' + route + l.search + l.hash);

          // Redirect to the base /incoc/ URL
          l.replace(l.protocol + '//' + l.host + '/incoc/');
        }
      } else {
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
