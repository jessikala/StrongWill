name: Deploy Daniel React Site

on:
  push:
    paths:
      - 'daniel/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd daniel
          npm install

      - name: Build project
        run: |
          cd daniel
          npm run build

      - name: Copy build files
        run: |
          mkdir public
          cp -r daniel/dist/* public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: daniel
