<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JB Studio</title>
  <script>
    // GitHub Pages SPA redirect solution for subdirectory deployment
    // This handles the /jb/ base path correctly
    (function() {
      var pathSegmentsToKeep = 1; // Keep '/jb' segment

      var l = window.location;

      // Store the full path we want to navigate to
      sessionStorage.setItem('redirect', l.href);

      // Redirect to /jb/index.html
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(1, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body>
  <!-- This page will never be visible, it immediately redirects -->
</body>
</html>
