    <title>JB Studio - Event Management</title>
    <script>
      // GitHub Pages SPA redirect handling for subdirectory deployment
      (function() {
        // Check if we have a stored redirect from 404.html
        var redirect = sessionStorage.getItem('ghpagesRedirect');
        if (redirect) {
          sessionStorage.removeItem('ghpagesRedirect');
          // Use history.replaceState to navigate to the stored path
          window.history.replaceState(null, null, redirect);
        }
      })();
    </script>
